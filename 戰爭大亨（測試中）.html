<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox 戰爭大亨任務站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#090d16',
                        darkCard: '#131926',
                        accentBlue: '#3b82f6',
                        accentPurple: '#a855f7',
                        accentPink: '#ec4899',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        html {
            scroll-behavior: smooth;
        }
        /* 官方社群卡片樣式 */
        .social-link-card {
            background-color: #131926;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            color: white;
            text-decoration: none;
            margin-bottom: 12px;
        }
        .social-link-card:hover { border-color: #3b82f6; background-color: #1a2234; }
    </style>
</head>

            <div onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex items-center space-x-2 cursor-pointer transition active:opacity-70">
                <span class="text-blue-500 text-xl font-bold">⚔</span>
                <span class="font-extrabold tracking-wider text-white">Roblox 戰爭大亨</span>
            </div>
            <button onclick="openTrackerModal()" class="relative px-3 py-1.5 text-xs font-semibold bg-blue-600/20 text-blue-400 border border-blue-500/30 rounded-lg hover:bg-blue-600/30 transition">
                <i class="fa-solid fa-bookmark mr-1"></i> 我的追蹤

            </button>
        </div>
    </nav>

                ⚔ <span class="gradient-text">Roblox 戰爭大亨</span>
            </h1>
            <p class="text-xs md:text-sm text-gray-400 max-w-lg mx-auto">
                現代化任務網站 | 坦克 | 飛機 | 直升機 | 船艦
            </p>
        </div>

        <!-- 搜尋列 -->
        <div class="max-w-md mx-auto mt-6 px-2">
            <div class="relative">
                <input type="text" id="search-input" oninput="searchTasks()"

            <div id="search-results-info" class="text-xs text-blue-400 mt-2 text-left px-2 hidden"></div>
        </div>
    </header>

                        <h3 class="text-lg font-black">坦克任務</h3>
                        <p class="text-blue-100 text-xs opacity-90">16 個項目</p>
                    </div>
                </div>
                <div onclick="scrollToSection('helicopter-section')" class="group relative overflow-hidden rounded-2xl bg-gradient-to-br from-purple-600 to-violet-700 p-4 cursor-pointer transform hover:-translate-y-1 transition duration-300 shadow-lg">

                        <h3 class="text-lg font-black">直升機任務</h3>

                    </div>
                </div>
                <div onclick="scrollToSection('airplane-section')" class="group relative overflow-hidden rounded-2xl bg-gradient-to-br from-pink-600 to-rose-700 p-4 cursor-pointer transform hover:-translate-y-1 transition duration-300 shadow-lg">

                        <h3 class="text-lg font-black">飛機任務</h3>
                        <p class="text-pink-100 text-xs opacity-90">17 個項目</p>
                    </div>

                <div onclick="scrollToSection('hovercraft-section')" class="group relative overflow-hidden rounded-2xl bg-gradient-to-br from-cyan-600 to-teal-700 p-4 cursor-pointer transform hover:-translate-y-1 transition duration-300 shadow-lg">

    <!-- 任務詳情彈出視窗 -->

        <div class="bg-darkCard border border-gray-700 w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden transform scale-95 transition-all duration-200">

                    </div>

    <!-- 追蹤管理彈出視窗 -->
    <div id="tracker-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-200">

                    <button onclick="clearAllTracked()" class="text-xs text-red-400 hover:text-red-300">全部清除</button>

        let trackedTasks = JSON.parse(localStorage.getItem('wtt_tracked')) || [];
        let activeModalTask = null;

        window.addEventListener('DOMContentLoaded', () => {
            renderTaskSections();
            updateTrackerBadge();
        });

        // 搜尋邏輯（已整合：搜尋時隱藏官方社群與分隔線）
        function searchTasks() {
            const input = document.getElementById('search-input');
            const infoText = document.getElementById('search-results-info');
            const socialSection = document.getElementById('social-section');
            const sectionDivider = document.getElementById('section-divider');
            const val = input.value.trim();

            if (val !== "") {
                if(socialSection) socialSection.style.display = 'none';
                if(sectionDivider) sectionDivider.style.display = 'none';
                infoText.classList.remove('hidden');
            } else {
                if(socialSection) socialSection.style.display = 'block';
                if(sectionDivider) sectionDivider.style.display = 'block';
                infoText.classList.add('hidden');
            }
            renderTaskSections(input.value);
        }

        function renderTaskSections(filterText = "") {
            const container = document.getElementById('tasks-container');
            const categorySelector = document.getElementById('category-selector');
            const sectionDivider = document.getElementById('section-divider');
            
            container.innerHTML = '';
            const filter = filterText.trim().toLowerCase();

            if (filter === "") {
                categorySelector.classList.remove('hidden');
                sectionDivider.classList.remove('hidden');

                Object.keys(taskData).forEach(key => {
                    const category = taskData[key];
                    const section = document.createElement('section');
                    section.id = `${key}-section`;
                    section.className = "space-y-4 scroll-mt-20";

                    section.innerHTML = `
                        <div class="border-b border-gray-800 pb-2">
                            <h2 class="text-xl font-bold text-white flex items-center gap-2">
                                <span class="w-1 h-5 bg-blue-500 rounded-full"></span>
                                ${category.title}
                            </h2>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                            ${category.tasks.map((task, index) => {
                                const isTracked = trackedTasks.some(t => t.name === task.name);
                                return `
                                    <div onclick="openTaskDetail('${key}', ${index})" 
                                         class="p-4 rounded-xl border transition-all duration-200 cursor-pointer flex flex-col justify-between h-36 bg-darkCard border-gray-800 hover:border-blue-500/50">
                                        <div class="flex justify-between items-start">
                                            <span class="text-xs text-blue-400 font-medium bg-blue-500/10 px-1.5 py-0.5 rounded">
                                                載具/裝備
                                            </span>
                                        </div>
                                        <h4 class="text-sm font-bold text-white truncate my-2">${task.name}</h4>
                                        <div class="flex justify-between items-center text-xs text-gray-500 pt-2 border-t border-gray-800/60">
                                            <span>點擊查看 →</span>
                                            ${isTracked ? '<span class="text-[10px] text-green-400 bg-green-500/10 px-1.5 py-0.5 rounded">追蹤中</span>' : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                    container.appendChild(section);
                });
            } else {
                categorySelector.classList.add('hidden');
                sectionDivider.classList.add('hidden');

                let totalMatches = 0;

                Object.keys(taskData).forEach(key => {
                    const category = taskData[key];
                    const filteredTasks = category.tasks.map((t, idx) => ({...t, originalIndex: idx})).filter(t => 
                        t.name.toLowerCase().includes(filter)
                    );

                    if (filteredTasks.length > 0) {
                        totalMatches += filteredTasks.length;
                        const section = document.createElement('section');
                        section.className = "space-y-4";

                        section.innerHTML = `
                            <div class="border-b border-gray-800 pb-2">
                                <h2 class="text-lg font-bold text-white">${category.title}</h2>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                ${filteredTasks.map(task => {
                                    const isTracked = trackedTasks.some(t => t.name === task.name);
                                    return `
                                        <div onclick="openTaskDetail('${key}', ${task.originalIndex})" 
                                             class="p-4 rounded-xl border transition-all duration-200 cursor-pointer flex flex-col justify-between h-36 bg-darkCard border-gray-800 hover:border-blue-500/50">
                                            <div class="flex justify-between items-start">
                                                <span class="text-xs text-blue-400 font-medium bg-blue-500/10 px-1.5 py-0.5 rounded">
                                                    載具/裝備
                                                </span>
                                            </div>
                                            <h4 class="text-sm font-bold text-white truncate my-2">${task.name}</h4>
                                            <div class="flex justify-between items-center text-xs text-gray-500 pt-2 border-t border-gray-800/60">
                                                <span>點擊查看 →</span>
                                                ${isTracked ? '<span class="text-[10px] text-green-400 bg-green-500/10 px-1.5 py-0.5 rounded">追蹤中</span>' : ''}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        `;
                        container.appendChild(section);
                    }
                });

                const infoText = document.getElementById('search-results-info');
                infoText.classList.remove('hidden');
                infoText.innerText = `找到 ${totalMatches} 個名稱相符項目`;
            }
        }

        function openTaskDetail(categoryKey, index) {
            const category = taskData[categoryKey];
            const task = category.tasks[index];
            activeModalTask = { ...task, categoryTitle: category.title };

            document.getElementById('modal-category').innerText = category.title;
            document.getElementById('modal-title').innerText = task.name;
            document.getElementById('modal-requirement').innerText = task.requirement;

            const isTracked = trackedTasks.some(t => t.name === task.name);
            updateModalTrackButtonState(isTracked);

            document.getElementById('modal-toast').classList.add('opacity-0');

            const modal = document.getElementById('detail-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.remove('scale-95');
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('scale-95');
            activeModalTask = null;
        }

        function copyCurrentRequirement() {
            if (!activeModalTask) return;
            const text = `【${activeModalTask.name}】解鎖條件：${activeModalTask.requirement}`;
            
            const dummy = document.createElement("textarea");
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand("copy");
            document.body.removeChild(dummy);

            showToast("已成功複製！");
        }

        function showToast(msg) {
            const toast = document.getElementById('modal-toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 2000);
        }

        function toggleTrackCurrent() {
            if (!activeModalTask) return;
            toggleTrackDirectly(activeModalTask.name, activeModalTask.categoryTitle, activeModalTask.requirement);
            const isTracked = trackedTasks.some(t => t.name === activeModalTask.name);
            updateModalTrackButtonState(isTracked);
            showToast(isTracked ? "已追蹤" : "取消追蹤");
        }

        function updateModalTrackButtonState(isTracked) {
            const btn = document.getElementById('modal-track-btn');
            if (isTracked) {
                btn.className = "flex-1 bg-red-600/20 text-red-400 border border-red-500/20 font-bold py-2 px-4 rounded-xl text-sm transition";
                btn.innerText = "取消追蹤";
            } else {
                btn.className = "flex-1 bg-blue-600 text-white font-bold py-2 px-4 rounded-xl text-sm transition";
                btn.innerText = "加入追蹤";
            }
        }

        function toggleTrackDirectly(name, category, requirement) {
            const index = trackedTasks.findIndex(t => t.name === name);
            if (index > -1) {
                trackedTasks.splice(index, 1);
            } else {
                trackedTasks.push({ name, category, requirement });
            }
            localStorage.setItem('wtt_tracked', JSON.stringify(trackedTasks));
            updateTrackerBadge();
            
            const input = document.getElementById('search-input');
            renderTaskSections(input.value);
        }

        function openTrackerModal() {
            const modal = document.getElementById('tracker-modal');
            renderTrackerList();
            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeTrackerModal() {
            document.getElementById('tracker-modal').classList.add('opacity-0', 'pointer-events-none');
        }

        function renderTrackerList() {
            const content = document.getElementById('tracker-list-content');
            if (trackedTasks.length === 0) {
                content.innerHTML = `<p class="text-center py-6 text-xs text-gray-500">暫無追蹤項目</p>`;
                return;
            }
            content.innerHTML = trackedTasks.map(t => `
                <div class="p-2.5 bg-gray-900 border border-gray-800 rounded-lg flex items-center justify-between text-xs">
                    <div>
                        <span class="text-[10px] text-blue-400 font-bold">[${t.category}]</span>
                        <span class="text-white font-bold">${t.name}</span>
                        <p class="text-gray-400 mt-1">${t.requirement}</p>
                    </div>
                    <button onclick="toggleTrackDirectly('${t.name}'); renderTrackerList();" class="text-red-400 px-2 font-bold">×</button>
                </div>
            `).join('');
        }

        function clearAllTracked() {
            trackedTasks = [];
            localStorage.setItem('wtt_tracked', JSON.stringify([]));
            updateTrackerBadge();
            renderTrackerList();
            
            const input = document.getElementById('search-input');
            renderTaskSections(input.value);
        }

        function updateTrackerBadge() {
            const badge = document.getElementById('tracker-badge');
            if (trackedTasks.length > 0) {
                badge.innerText = trackedTasks.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function scrollToSection(id) {
            const el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
